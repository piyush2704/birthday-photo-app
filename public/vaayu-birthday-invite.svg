<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="960" y2="1280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F7F1E7"/>
      <stop offset="52%" stop-color="#EEF5F8"/>
      <stop offset="100%" stop-color="#F2EDF8"/>
    </linearGradient>
    <linearGradient id="panel" x1="240" y1="210" x2="860" y2="1120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFDF8" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#FFF8F1" stop-opacity="0.92"/>
    </linearGradient>
    <radialGradient id="sunCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(540 318) rotate(90) scale(76)">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="60%" stop-color="#FFD76A"/>
      <stop offset="100%" stop-color="#FFBE3D"/>
    </radialGradient>
    <filter id="softShadow" x="120" y="150" width="840" height="1050" filterUnits="userSpaceOnUse">
      <feGaussianBlur in="SourceAlpha" stdDeviation="26"/>
      <feOffset dy="18"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.31 0 0 0 0 0.23 0 0 0 0 0.17 0 0 0 0.14 0"/>
      <feBlend in2="BackgroundImageFix" mode="normal" result="effect1_dropShadow_1_1"/>
      <feBlend in="SourceGraphic" in2="effect1_dropShadow_1_1" mode="normal" result="shape"/>
    </filter>
    <style>
      .headline {
        font-family: "Playfair Display", Georgia, serif;
        fill: #2D1F14;
      }
      .script {
        font-family: "Dancing Script", cursive;
        fill: #8B6B52;
      }
      .copy {
        font-family: "Lato", Arial, sans-serif;
        fill: #6B4F35;
      }
      .copy-soft {
        font-family: "Lato", Arial, sans-serif;
        fill: #8B6B52;
      }
      .orbit-group {
        transform-origin: 540px 318px;
        animation: spin 24s linear infinite;
      }
      .float-moon {
        animation: floatMoon 6s ease-in-out infinite;
      }
      .twinkle-1 { animation: twinkle 2.8s ease-in-out infinite; transform-origin: center; }
      .twinkle-2 { animation: twinkle 3.4s ease-in-out infinite 0.6s; transform-origin: center; }
      .twinkle-3 { animation: twinkle 2.4s ease-in-out infinite 1.1s; transform-origin: center; }
      .twinkle-4 { animation: twinkle 3.1s ease-in-out infinite 0.9s; transform-origin: center; }
      .twinkle-5 { animation: twinkle 2.6s ease-in-out infinite 1.5s; transform-origin: center; }
      .card-float-a {
        animation: floatCardA 5.4s ease-in-out infinite;
      }
      .card-float-b {
        animation: floatCardB 6.3s ease-in-out infinite;
      }
      .card-float-c {
        animation: floatCardA 4.9s ease-in-out infinite 0.5s;
      }
      .card-float-d {
        animation: floatCardB 5.7s ease-in-out infinite 0.8s;
      }
      .cta-pulse {
        animation: pulseInvite 2.6s ease-in-out infinite;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.35; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.25); }
      }
      @keyframes floatMoon {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes floatCardA {
        0%, 100% { transform: translateY(0px) rotate(-5deg); }
        50% { transform: translateY(-10px) rotate(-3deg); }
      }
      @keyframes floatCardB {
        0%, 100% { transform: translateY(0px) rotate(4deg); }
        50% { transform: translateY(9px) rotate(6deg); }
      }
      @keyframes pulseInvite {
        0%, 100% { transform: translateY(0px); box-shadow: 0 16px 28px rgba(92,138,158,0.18); }
        50% { transform: translateY(-3px); box-shadow: 0 20px 34px rgba(92,138,158,0.28); }
      }
    </style>
  </defs>

  <rect width="1080" height="1350" rx="0" fill="url(#bg)"/>

  <g opacity="0.24">
    <circle cx="150" cy="168" r="58" fill="#E5D7C7"/>
    <circle cx="892" cy="114" r="42" fill="#E7EFF6"/>
    <circle cx="944" cy="1160" r="74" fill="#EEE3EF"/>
    <circle cx="138" cy="1168" r="54" fill="#E7EEF4"/>
  </g>

  <g class="float-moon" opacity="0.86">
    <circle cx="164" cy="198" r="34" fill="#DDE3F3"/>
    <path d="M186 169C176 162 161 160 148 165C129 173 120 191 123 209C126 228 141 242 160 245C174 247 186 242 194 234C184 237 174 236 165 233C147 230 135 217 132 202C129 188 134 174 145 165C156 158 171 157 186 169Z" fill="#F5F7FD"/>
    <circle cx="151" cy="190" r="4.8" fill="#C8D0E6" opacity="0.46"/>
    <circle cx="147" cy="214" r="6.4" fill="#C8D0E6" opacity="0.38"/>
    <circle cx="170" cy="220" r="4.1" fill="#C8D0E6" opacity="0.44"/>
  </g>

  <g class="twinkle-1">
    <path d="M896 174V194" stroke="#D8C27A" stroke-width="4" stroke-linecap="round"/>
    <path d="M886 184H906" stroke="#D8C27A" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g class="twinkle-2">
    <path d="M948 254V270" stroke="#D8C27A" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M940 262H956" stroke="#D8C27A" stroke-width="3.6" stroke-linecap="round"/>
  </g>
  <g class="twinkle-3">
    <path d="M874 314V328" stroke="#D8C27A" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M867 321H881" stroke="#D8C27A" stroke-width="3.2" stroke-linecap="round"/>
  </g>
  <circle class="twinkle-4" cx="210" cy="284" r="4.6" fill="#E3CF92"/>
  <circle class="twinkle-5" cx="850" cy="1040" r="4.8" fill="#E3CF92"/>

  <g filter="url(#softShadow)">
    <rect x="160" y="190" width="760" height="980" rx="42" fill="url(#panel)"/>
  </g>

  <g class="orbit-group">
    <circle cx="540" cy="318" r="112" stroke="#D8D8D8" stroke-width="3" stroke-dasharray="6 9"/>
    <g transform="translate(652 318)">
      <circle cx="0" cy="0" r="24" fill="#4DA6FF"/>
      <path d="M -3 -13 C 2 -14, 8 -13, 11 -10 C 13 -8, 12 -4, 10 -3 C 9 -1, 8 2, 9 4 C 10 8, 8 11, 5 13 C 2 15, 0 12, -1 10 C -2 7, -4 5, -6 4 C -9 3, -10 0, -9 -3 C -7 -6, -6 -8, -5 -10 C -5 -12, -4 -13, -3 -13 Z" fill="#58B95A"/>
      <path d="M -13 -2 C -10 -3, -8 -2, -8 1 C -8 4, -9 5, -10 8 C -10 10, -9 12, -10 14 C -11 15, -14 14, -14 11 C -14 9, -15 7, -15 5 C -15 2, -14 0, -13 -2 Z" fill="#58B95A"/>
      <circle cx="15" cy="2" r="1.4" fill="#58B95A"/>
      <circle cx="-16" cy="10" r="1.5" fill="#58B95A"/>
      <ellipse cx="0" cy="-18" rx="6" ry="2.4" fill="#EAF6FF" opacity="0.55"/>
      <circle cx="-8" cy="-8" r="5" fill="white" opacity="0.22"/>
    </g>
  </g>

  <g>
    <circle cx="540" cy="318" r="40" fill="#FFC83D"/>
    <circle cx="526" cy="303" r="11" fill="#FFE7A3" opacity="0.76"/>
    <g stroke="#FFB800" stroke-width="6" stroke-linecap="round">
      <line x1="540" y1="254" x2="540" y2="232"/>
      <line x1="540" y1="404" x2="540" y2="382"/>
      <line x1="474" y1="318" x2="452" y2="318"/>
      <line x1="628" y1="318" x2="606" y2="318"/>
      <line x1="494" y1="272" x2="478" y2="256"/>
      <line x1="586" y1="364" x2="602" y2="380"/>
      <line x1="494" y1="364" x2="478" y2="380"/>
      <line x1="586" y1="272" x2="602" y2="256"/>
    </g>
    <circle cx="540" cy="318" r="76" fill="url(#sunCore)" opacity="0.16"/>
  </g>

  <text x="540" y="438" text-anchor="middle" class="script" font-size="38">You’re invited to</text>
  <text x="540" y="542" text-anchor="middle" class="headline" font-size="82" font-weight="700">Vaayu’s 1st Birthday</text>
  <text x="540" y="610" text-anchor="middle" class="script" font-size="44">A first trip around the sun</text>

  <text x="540" y="698" text-anchor="middle" class="copy-soft" font-size="20" letter-spacing="4.8">JOIN US FOR A DAY OF JOY, PHOTOS, AND CELEBRATION</text>

  <g class="card-float-a">
    <rect x="238" y="770" width="176" height="212" rx="20" fill="#FFFFFF" opacity="0.92"/>
    <rect x="250" y="782" width="152" height="146" rx="14" fill="#EAF2F8"/>
    <rect x="264" y="944" width="86" height="10" rx="5" fill="#DCC6A2"/>
    <rect x="264" y="964" width="110" height="8" rx="4" fill="#E8DCCB"/>
  </g>

  <g class="card-float-b">
    <rect x="676" y="756" width="168" height="202" rx="20" fill="#FFFFFF" opacity="0.92"/>
    <rect x="688" y="768" width="144" height="138" rx="14" fill="#F1E8F3"/>
    <rect x="702" y="922" width="82" height="10" rx="5" fill="#DCC6A2"/>
    <rect x="702" y="942" width="98" height="8" rx="4" fill="#E8DCCB"/>
  </g>

  <g class="card-float-c">
    <rect x="410" y="820" width="132" height="158" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <rect x="420" y="830" width="112" height="102" rx="12" fill="#F6EFE5"/>
    <rect x="432" y="946" width="68" height="8" rx="4" fill="#DCC6A2"/>
  </g>

  <g class="card-float-d">
    <rect x="548" y="834" width="138" height="164" rx="18" fill="#FFFFFF" opacity="0.88"/>
    <rect x="558" y="844" width="118" height="106" rx="12" fill="#EEF5F8"/>
    <rect x="570" y="964" width="72" height="8" rx="4" fill="#DCC6A2"/>
  </g>

  <text x="540" y="1062" text-anchor="middle" class="headline" font-size="34" font-weight="600">Save the date and celebrate with us</text>
  <text x="540" y="1110" text-anchor="middle" class="copy" font-size="26">Memories, laughter, and a little birthday magic await.</text>

  <foreignObject x="344" y="1160" width="392" height="88">
    <div xmlns="http://www.w3.org/1999/xhtml" class="cta-pulse" style="width:392px;height:88px;border-radius:999px;background:linear-gradient(135deg,#5C8A9E,#7BA7BE);display:flex;align-items:center;justify-content:center;">
      <div style="font-family:Lato,Arial,sans-serif;color:#FFF8F2;font-size:28px;letter-spacing:0.08em;text-transform:uppercase;">Celebrate Vaayu</div>
    </div>
  </foreignObject>
</svg>
